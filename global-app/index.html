<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Globalgle Dashboard</title>

    <!-- Space Grotesk Font — Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Lord Icon -->
    
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
  </head>
  <body>
    <!-- Blurred background — filter:blur on the element itself is the only
         100% reliable way to get frosted-glass in production Chromium.
         backdrop-filter on children fails when Chrome creates separate GPU
         compositing layers for fixed/positioned elements. -->
    <div id="bg-layer" aria-hidden="true"></div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
